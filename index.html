<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synapse Archive</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg transform='translate(0,1.5)'%3E%3Cpath d='M23.6 0c-3.4 0-6.3 2-7.6 4.9C14.7 2 11.8 0 8.4 0 3.8 0 0 3.8 0 8.4c0 9.3 15.3 17.6 15.9 17.9.2.1.4.2.6.2s.4-.1.6-.2c.6-.3 15.9-8.6 15.9-17.9C33 3.8 29.2 0 24.6 0z' fill='%23A6332B'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#FAFAFA;
    --surface-2:#F1F1F1;
    --border:#E2E2E2;
    --border-soft:#EBEBEB;
    --accent:#A6332B;
    --accent-soft:#A6332B1F;
    --accent-2:#A6332B;
    --gold:#C9A227;
    --text:#303030;
    --text-muted:#6B6B6B;
    --text-faint:#9A9A9A;
    --radius:14px;
    --font-body:'Open Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  ::selection{ background:#A6332B; color:#FFFFFF; }
  ::-moz-selection{ background:#A6332B; color:#FFFFFF; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:var(--accent); }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  html::-webkit-scrollbar{
    width:5px;
  }
  html::-webkit-scrollbar-track{
    background-color:transparent;
  }
  html::-webkit-scrollbar-thumb{
    border-radius:3px;
    background-color:#A6332B;
  }
  html::-webkit-scrollbar-button{
    width:0;
    height:0;
  }

  /* ---------- Header ---------- */
  header.hero{
    position:relative;
    padding:64px 32px 40px;
    border-bottom:1px solid var(--border-soft);
  }
  .hero-inner{ position:relative; z-index:1; max-width:1100px; margin:0 auto; text-align:center; }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 14px;
  }
  h1.title{
    font-family:var(--font-body);
    font-weight:700;
    font-size:clamp(36px, 6vw, 60px);
    line-height:1.05;
    margin:0 0 12px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    color:var(--text-muted);
    font-size:15px;
    max-width:520px;
    line-height:1.6;
    margin:0 auto;
  }

  /* ---------- Controls ---------- */
  .controls{
    max-width:1100px;
    margin:28px auto 0;
    padding:0 32px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .corner-add{
    position:fixed;
    right:28px; bottom:28px;
    z-index:40;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
  }
  .icon-btn{
    background:transparent;
    border:1px solid transparent;
    border-radius:10px;
    color:var(--text-muted);
    width:40px; height:40px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background-color 0.15s, color 0.15s;
  }
  .icon-btn:hover{ background:var(--surface-2); color:var(--text); }
  .type-tabs{
    display:flex;
    gap:4px;
    border-bottom:1px solid var(--border-soft);
    padding-bottom:2px;
  }
  .type-tab{
    background:none;
    border:none;
    color:var(--text-muted);
    font-size:13px;
    padding:8px 4px;
    margin-right:16px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color 0.15s, border-color 0.15s;
  }
  .type-tab:hover{ color:var(--text); }
  .type-tab.active{
    color:var(--text);
    border-bottom-color:var(--accent);
    font-weight:500;
  }
  .secret-btn.secret-active{
    color:var(--accent);
  }
  .secret-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:14px;
    padding:8px 4px;
    margin-left:auto;
    cursor:pointer;
    transition:color 0.15s, transform 0.15s;
  }
  .secret-btn:hover{ color:var(--accent); transform:scale(1.08); }

  .preset-pills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .pill-chip{
    font-family:var(--font-mono);
    font-size:12px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-muted);
    padding:6px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:all 0.15s;
  }
  .pill-chip:hover{ border-color:var(--accent-soft); color:var(--text); }
  .pill-chip.active{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent);
  }
  .type-tab-dropdown-wrap{
    position:relative;
  }
  .prompt-dropdown{
    position:absolute;
    top:100%; left:0;
    margin-top:4px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.12);
    padding:6px;
    display:none;
    flex-direction:column;
    min-width:140px;
    z-index:30;
  }
  .prompt-dropdown.open{ display:flex; }
  .type-tab-dropdown-wrap:hover .prompt-dropdown{ display:flex; }
  .prompt-dropdown-item{
    background:none;
    border:none;
    text-align:left;
    padding:8px 10px;
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--text-muted);
    border-radius:6px;
    cursor:pointer;
    transition:background-color 0.15s, color 0.15s;
  }
  .prompt-dropdown-item:hover{ background:var(--surface-2); color:var(--text); }
  .prompt-dropdown-item.active{ color:var(--accent); font-weight:500; }

  /* ---------- Gallery ---------- */
  main{
    max-width:1100px;
    margin:0 auto;
    padding:32px;
  }
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:18px;
  }
  @media (max-width:560px){ .controls, main, header.hero{ padding-left:18px; padding-right:18px; } }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:border-color 0.2s, transform 0.2s;
  }
  .card:hover{ border-color:var(--accent-soft); transform:translateY(-2px); }
  .card-image-wrap{
    position:relative;
    aspect-ratio:1/1;
    background:var(--surface-2);
    overflow:hidden;
  }
  .card-image-wrap img{
    width:100%; height:100%; object-fit:cover; display:block;
    cursor:zoom-in;
  }
  .card-image-wrap.img-error img{ display:none; }
  .img-error-fallback{
    display:none;
    position:absolute; inset:0;
    align-items:center; justify-content:center;
    text-align:center;
    padding:16px;
    font-size:12px;
    color:var(--text-faint);
    background:var(--surface-2);
  }
  .card-image-wrap.img-error .img-error-fallback{ display:flex; }
  .card-actions{
    position:absolute; bottom:8px; right:8px;
    display:flex;
    gap:6px;
    opacity:0;
    transition:opacity 0.15s;
  }
  .card:hover .card-actions{ opacity:1; }
  .card-icon-btn{
    width:26px; height:26px;
    border-radius:50%;
    background:rgba(15,14,23,0.75);
    border:1px solid var(--border);
    color:#FFFFFF;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:13px;
    transition:color 0.15s, border-color 0.15s;
  }
  .card-icon-btn:hover{ color:var(--accent); border-color:var(--accent); }
  .card-icon-btn.card-delete:hover{ color:var(--accent-2); border-color:var(--accent-2); }
  .type-badge{
    position:absolute; top:8px; left:8px;
    background:rgba(15,14,23,0.75);
    color:#FFFFFF;
    font-family:var(--font-mono);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:3px 8px;
    border-radius:999px;
  }

  .card-number{
    display:flex; align-items:center;
    padding:10px 14px;
    border-top:1px solid var(--border-soft);
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:11px;
  }
  .card-number .params{ color:var(--accent); }

  .card-meta{
    padding:0 14px 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card-meta.hidden{ display:none; }
  .card-meta .field-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-faint);
    margin:0 0 3px;
  }
  .card-meta .field-value{
    font-size:12.5px;
    line-height:1.55;
    color:var(--text);
    margin:0;
    word-break:break-word;
  }
  .card-meta .field-value.muted{ color:var(--text-muted); }
  .copy-field{ cursor:pointer; }
  .copy-wrap{
    position:relative;
    border-radius:6px;
    margin:0 -8px;
    transition:background-color 0.15s;
  }
  .copy-wrap:hover{ background:var(--surface-2); }
  .copy-wrap.copied{ background:var(--surface-2); }
  .copy-block{
    max-height:76px;
    overflow-y:scroll;
    cursor:pointer;
    padding:6px 8px;
  }
  .copy-block::-webkit-scrollbar{
    width:6px;
  }
  .copy-block::-webkit-scrollbar-track{
    background-color:transparent;
  }
  .copy-block::-webkit-scrollbar-thumb{
    border-radius:3px;
    background-color:#A6332B;
  }
  .copy-block::-webkit-scrollbar-button{
    width:0;
    height:0;
  }

  .copy-text{ display:inline-block; transition:filter 0.15s, opacity 0.15s; }
  .copy-wrap.copied .copy-text{ filter:blur(4px); opacity:0.7; }
  .copy-feedback{
    position:absolute; inset:0;
    z-index:2;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--accent);
    text-shadow:0 1px 3px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.15s;
    border-radius:6px;
  }
  .copy-wrap.copied .copy-feedback{ opacity:1; }

  /* ---------- Empty state ---------- */
  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:80px 20px;
    color:var(--text-muted);
  }
  .empty-state h2{
    font-family:var(--font-body);
    font-weight:700;
    font-size:24px;
    color:var(--text);
    margin:0 0 8px;
  }
  .empty-state p{ font-size:14px; margin:0; }
  .loading-state p{
    font-family:var(--font-mono);
    animation:loading-pulse 1.2s ease-in-out infinite;
  }
  @keyframes loading-pulse{
    0%, 100%{ opacity:0.4; }
    50%{ opacity:1; }
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(10,9,15,0.72);
    display:none;
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    z-index:50;
    padding:60px 20px;
  }
  .overlay.open{ display:flex; }
  .lightbox-overlay{
    align-items:center;
    padding:40px;
    background:rgba(10,9,15,0.9);
    cursor:zoom-out;
  }
  .lightbox-overlay img{
    max-width:100%;
    max-height:90vh;
    object-fit:contain;
    border-radius:8px;
    cursor:default;
  }
  .lightbox-close{
    position:fixed;
    top:20px; right:24px;
    width:40px; height:40px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.3);
    color:#FFFFFF;
    font-size:20px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:51;
  }
  .lightbox-close:hover{ background:rgba(255,255,255,0.2); }
  .modal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    width:100%;
    max-width:520px;
    padding:28px;
  }
  .modal h2{
    font-family:var(--font-body);
    font-weight:700;
    font-size:22px;
    margin:0 0 4px;
  }
  .modal .modal-sub{
    color:var(--text-muted);
    font-size:13px;
    margin:0 0 22px;
  }
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .field input[type=text], .field input[type=password], .field textarea, .field select{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:10px 12px;
    font-size:13.5px;
    font-family:var(--font-body);
    resize:vertical;
  }
  .field textarea{ min-height:64px; line-height:1.5; }
  .field input[type=file]{
    width:100%;
    font-size:13px;
    color:var(--text-muted);
  }
  .field-row{ display:flex; gap:12px; }
  .field-row .field{ flex:1; }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:22px;
  }
  .btn{
    border-radius:8px;
    padding:10px 18px;
    font-size:13.5px;
    cursor:pointer;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    white-space:nowrap;
    flex-shrink:0;
  }
  .btn:hover{ border-color:var(--text-muted); }
  .btn-primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#FFFFFF;
    font-weight:500;
  }
  .btn-primary:hover{ opacity:0.9; border-color:var(--accent); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
  .hint{ font-size:11.5px; color:var(--text-faint); margin-top:6px; line-height:1.5; }
  .type-group.hidden{ display:none; }
  .optional-hint{ text-transform:none; letter-spacing:0; color:var(--text-faint); font-size:11px; }
  .crop-preview{
    position:relative;
    width:180px;
    height:180px;
    border-radius:8px;
    overflow:hidden;
    background:var(--surface-2);
    border:1px solid var(--border);
    cursor:crosshair;
    touch-action:none;
    user-select:none;
  }
  .crop-preview img{
    width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;
  }
  .crop-crosshair{
    position:absolute;
    width:16px; height:16px;
    border:2px solid #FFFFFF;
    border-radius:50%;
    box-shadow:0 0 0 1px rgba(0,0,0,0.4);
    transform:translate(-50%,-50%);
    pointer-events:none;
    left:50%; top:50%;
  }
  .character-row{
    display:flex;
    gap:8px;
    margin-bottom:8px;
    align-items:center;
  }
  .character-row .char-label{
    width:32px;
    height:36px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
  }
  .character-row input{
    flex:1;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:10px 12px;
    font-size:13.5px;
    font-family:var(--font-body);
  }
  .character-row .remove-character{
    background:none;
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text-muted);
    width:36px;
    flex-shrink:0;
    cursor:pointer;
    font-size:16px;
  }
  .character-row .remove-character:hover{ color:var(--accent-2); border-color:var(--accent-2); }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    left:50%; bottom:28px;
    transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 20px;
    border-radius:10px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s, transform 0.2s;
    z-index:60;
    max-width:90vw;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast.error{ border-color:var(--accent-2); color:var(--accent-2); }

  .cursor-heart{
    position:fixed;
    pointer-events:none;
    width:17px;
    height:17px;
    z-index:9999;
    left:0; top:0;
    transform:translate(-50%,-50%);
    animation:cursor-heart-float 900ms ease-out forwards;
    will-change:transform, opacity;
  }
  .cursor-heart svg{ width:100%; height:100%; display:block; }
  @keyframes cursor-heart-float{
    0%{ transform:translate(-50%,-50%) scale(0.6); opacity:0.9; }
    100%{ transform:translate(-50%,-160%) scale(1.05); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>

<body>

<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">private archive · nai generations</p>
    <h1 class="title">Synapse Archive</h1>
  </div>
</header>

<button class="btn btn-primary corner-add" id="add-fab">Add piece</button>

<div class="controls">
  <div class="type-tabs" id="type-tabs">
    <button class="type-tab active" data-type="style">Style</button>
    <div class="type-tab-dropdown-wrap">
      <button class="type-tab" data-type="prompt" id="prompt-tab">Prompt</button>
      <div class="prompt-dropdown" id="prompt-dropdown">
        <button type="button" class="prompt-dropdown-item" data-category="GIRL">GIRL</button>
        <button type="button" class="prompt-dropdown-item" data-category="BOY">BOY</button>
        <button type="button" class="prompt-dropdown-item" data-category="DUO">DUO</button>
      </div>
    </div>
    <button class="type-tab" data-type="outfit">Outfit</button>
    <button class="secret-btn" id="secret-btn" title="???" aria-label="Secret">(^╷ ̫ ╷^)ﾉ❤︎</button>
  </div>
</div>

<main>
  <div class="gallery" id="gallery"></div>
</main>

<!-- Entry modal -->
<div class="overlay" id="entry-overlay">
  <div class="modal">
    <h2 id="entry-modal-title">Add new piece</h2>
    <p class="modal-sub">Commits the image and prompt straight to your repository.</p>
    <div class="field">
      <label for="f-image">Image <span class="optional-hint" id="f-image-hint"></span></label>
      <input type="file" id="f-image" accept="image/*">
    </div>
    <div class="field" id="crop-field" style="display:none;">
      <label>Focal point <span class="optional-hint">drag to choose what shows in the square</span></label>
      <div class="crop-preview" id="crop-preview">
        <img id="crop-preview-img" src="" alt="">
        <div class="crop-crosshair" id="crop-crosshair"></div>
      </div>
    </div>
    <div class="field">
      <label for="f-type">Type</label>
      <select id="f-type">
        <option value="style">Style</option>
        <option value="prompt">Prompt</option>
        <option value="outfit">Outfit</option>
        <option value="secret">Secret</option>
      </select>
    </div>
    <div class="field">
      <label for="f-number">Number <span class="optional-hint">shown when collapsed</span></label>
      <input type="text" id="f-number" placeholder="001">
    </div>

    <div class="field type-group" data-group="style">
      <label for="f-artists">Artist tags</label>
      <input type="text" id="f-artists" placeholder="artist:miyamoyan, artist:jp06, ...">
    </div>

    <div class="field type-group" data-group="prompt">
      <label>Category</label>
      <div class="preset-pills" id="category-pills">
        <button type="button" class="pill-chip" data-category="ALL">ALL</button>
        <button type="button" class="pill-chip" data-category="GIRL">GIRL</button>
        <button type="button" class="pill-chip" data-category="BOY">BOY</button>

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function escapeAttr(str){ return escapeHtml(str); }

function updateCropVisual(){
  cropCrosshair.style.left = cropX + '%';
  cropCrosshair.style.top = cropY + '%';
  cropPreviewImg.style.objectPosition = cropX + '% ' + cropY + '%';
}

function showCropPreview(src){
  cropPreviewImg.src = src;
  cropField.style.display = '';
  updateCropVisual();
}

function hideCropPreview(){
  cropPreviewImg.src = '';
  cropField.style.display = 'none';

function setCropFromEvent(ev){
  const rect = cropPreview.getBoundingClientRect();
  const x = ((ev.clientX - rect.left) / rect.width) * 100;
  const y = ((ev.clientY - rect.top) / rect.height) * 100;
  cropX = Math.max(0, Math.min(100, Math.round(x)));
  cropY = Math.max(0, Math.min(100, Math.round(y)));
  updateCropVisual();
}

let croppingActive = false;
cropPreview.addEventListener('pointerdown', (ev)=>{
  croppingActive = true;
  cropPreview.setPointerCapture(ev.pointerId);
  setCropFromEvent(ev);
});

  if(croppingActive) setCropFromEvent(ev);
});
cropPreview.addEventListener('pointerup', ()=> croppingActive = false);

/* ---------------- Supabase Storage + REST helpers ---------------- */
async function sbUploadImage(path, file){
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/images/${path}`, {
    method: 'POST',
    headers: sbHeaders({ 'Content-Type': file.type || 'application/octet-stream' }),
    body: file
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `Image upload failed (${res.status})`);
  }
  return `${SUPABASE_URL}/storage/v1/object/public/images/${path}`;
}

async function sbDeleteImage(path){
  await fetch(`${SUPABASE_URL}/storage/v1/object/images/${path}`, {
    method: 'DELETE',
    headers: sbHeaders()
  }).catch(()=>{});
}

function imagePathFromUrl(url){
  if(!url) return null;
  const marker = '/storage/v1/object/public/images/';
  const idx = url.indexOf(marker);
  return idx >= 0 ? url.slice(idx + marker.length) : null;
}

function entryToRow(entryData){
  return {
    id: entryData.id,
    image: entryData.image,
    crop_x: entryData.cropX,
    crop_y: entryData.cropY,
    type: entryData.type,
    number: entryData.number,
    params: entryData.params,
    artists: entryData.artists,
    category: entryData.category,
    prompt: entryData.prompt,
    negative: entryData.negative,
    characters: entryData.characters,
    tags: entryData.tags,
    date: entryData.date
  };
}

async function submitEntry(){
  const fileInput = document.getElementById('f-image');
  const file = fileInput.files[0];
  const isEdit = !!editingId;
  if(!file && !isEdit){ showToast('Choose an image first.', true); return; }

  const type = document.getElementById('f-type').value;
  const numberValue = document.getElementById('f-number').value.trim();
  if(numberValue){
    const usesCategory = (type === 'prompt' || type === 'secret');
    const dupe = entries.some(en => {
      if(en.id === editingId) return false;
      if(en.type !== type) return false;
      if((en.number || '').trim() !== numberValue) return false;
      if(usesCategory) return (en.category || '') === selectedCategory;
      return true;
    });
    if(dupe){
      const scopeLabel = usesCategory ? (selectedCategory || 'ALL') : type;
      showToast(`"${numberValue}" is already used in ${scopeLabel}. Choose a different number.`, true);
      return;
    }
  }

  const submitBtn = document.getElementById('entry-submit');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Saving...';

  try{
    const existingEntry = isEdit ? entries.find(en => en.id === editingId) : null;
    const id = isEdit ? editingId : `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
    let imageUrl = isEdit ? existingEntry.image : null;
    const oldImagePath = isEdit ? imagePathFromUrl(existingEntry.image) : null;

    if(file){
      const ext = file.name.split('.').pop().toLowerCase();
      const newImagePath = `${id}-${Date.now()}.${ext}`;
      imageUrl = await sbUploadImage(newImagePath, file);
      if(oldImagePath) await sbDeleteImage(oldImagePath);
    }

    const characters = Array.from(characterList.querySelectorAll('.character-row')).map(row => ({
      name: row.querySelector('.char-label').textContent.trim(),
      outfit: row.querySelector('.char-outfit').value.trim()
    })).filter(c => c.outfit);

    const outfitCharacters = [
      { name: 'A', outfit: document.getElementById('f-outfit-a').value.trim() },
      { name: 'B', outfit: document.getElementById('f-outfit-b').value.trim() }
    ].filter(c => c.outfit);

    const entryData = {
      id,
      image: imageUrl,
      cropX,
      cropY,
      type,
      number: numberValue,
      params: (type === 'style' || type === 'prompt' || type === 'secret') ? document.getElementById('f-params').value.trim() : '',
      artists: type === 'style' ? document.getElementById('f-artists').value.trim() : '',
      category: (type === 'prompt' || type === 'secret') ? selectedCategory : '',
      prompt: (type === 'prompt' || type === 'secret') ? document.getElementById('f-prompt').value.trim() : '',
      negative: (type === 'style' || type === 'prompt' || type === 'secret') ? document.getElementById('f-negative').value.trim() : '',
      characters: (type === 'prompt' || type === 'secret') ? characters : (type === 'outfit' ? outfitCharacters : []),
      tags: [],
      date: isEdit ? (existingEntry.date || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10)
    };

    const row = entryToRow(entryData);

    if(isEdit){
      const res = await fetch(`${SUPABASE_URL}/rest/v1/entries?id=eq.${id}`, {
        method: 'PATCH',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }),
        body: JSON.stringify(row)
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.message || `Update failed (${res.status})`);
      }
    }else{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/entries`, {
        method: 'POST',
        headers: sbHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }),
        body: JSON.stringify(row)
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.message || `Save failed (${res.status})`);
      }
    }

    await loadEntries();
    entryOverlay.classList.remove('open');
    editingId = null;
    showToast('Saved.');
  }catch(err){
    showToast(err.message || 'Save failed.', true);
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Save';
  }
}

function deleteEntry(id){
  requireUnlock(async ()=>{
    const proceed = await confirmDialog('Delete this piece?', "This can't be undone.", 'Delete');
    if(!proceed) return;
    const entry = entries.find(e => e.id === id);
    if(!entry) return;

    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/entries?id=eq.${id}`, {
        method: 'DELETE',
        headers: sbHeaders()
      });
      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.message || `Delete failed (${res.status})`);
      }

      const imgPath = imagePathFromUrl(entry.image);
      if(imgPath) await sbDeleteImage(imgPath);

      await loadEntries();
      showToast('Deleted.');
    }catch(err){
      showToast(err.message || 'Delete failed.', true);
    }
  });
}

});

/* ---------------- password gate (write access + secret tab) ---------------- */
const ACCESS_HASH = 'd4ebe249aeb656f93143920b1ca7897c26fe04a064674d7c1849b435acb41ca2';
const ACCESS_SESSION_KEY = 'synapse-unlocked';

async function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function isUnlocked(){
  return sessionStorage.getItem(ACCESS_SESSION_KEY) === '1';
}

const secretOverlay = document.getElementById('secret-overlay');
const secretBtn = document.getElementById('secret-btn');
let pendingUnlockAction = null;

function requireUnlock(action){
  if(isUnlocked()){
    action();
    return;
  }
  pendingUnlockAction = action;
  document.getElementById('secret-password').value = '';
  secretOverlay.classList.add('open');
  document.getElementById('secret-password').focus();
}

function enterSecretMode(){
  currentType = 'secret';
  resetCategoryFilter();
  document.querySelectorAll('.type-tab').forEach(b=> b.classList.remove('active'));
  secretBtn.classList.add('secret-active');
  closePromptDropdown();
  renderGallery();
}

secretBtn.addEventListener('click', ()=> requireUnlock(enterSecretMode));
document.getElementById('secret-cancel').addEventListener('click', ()=>{
  secretOverlay.classList.remove('open');
  pendingUnlockAction = null;
});
document.getElementById('secret-submit').addEventListener('click', async ()=>{
  const val = document.getElementById('secret-password').value;
  const hash = await sha256Hex(val);
  if(hash === ACCESS_HASH){
    sessionStorage.setItem(ACCESS_SESSION_KEY, '1');
    secretOverlay.classList.remove('open');
    const action = pendingUnlockAction;
    pendingUnlockAction = null;
    if(action) action();
  }else{
    showToast('Wrong password.', true);
  }
});
document.getElementById('secret-password').addEventListener('keydown', (ev)=>{
  if(ev.key === 'Enter') document.getElementById('secret-submit').click();
});

document.getElementById('gallery').addEventListener('click', (ev)=>{
  const fieldWrap = ev.target.closest('.copy-field');
  if(!fieldWrap) return;
  const el = fieldWrap.querySelector('.copy-wrap');
  if(!el) return;
  const text = el.dataset.copy;
  navigator.clipboard.writeText(text).then(()=>{
    el.classList.add('copied');
    setTimeout(()=> el.classList.remove('copied'), 1000);
  }).catch(()=> showToast('Could not copy to clipboard.', true));
});

/* ---------------- lightbox ---------------- */
const lightboxOverlay = document.getElementById('lightbox-overlay');
const lightboxImg = document.getElementById('lightbox-img');

function openLightbox(src){
  lightboxImg.src = src;
  lightboxOverlay.classList.add('open');
}
function closeLightbox(){
  lightboxOverlay.classList.remove('open');
  lightboxImg.src = '';
}
document.getElementById('lightbox-close').addEventListener('click', (ev)=>{
  ev.stopPropagation();
  closeLightbox();
});
lightboxOverlay.addEventListener('click', ()=> closeLightbox());
document.addEventListener('keydown', (ev)=>{
  if(ev.key !== 'Escape') return;
  if(lightboxOverlay.classList.contains('open')){ closeLightbox(); return; }
  document.querySelectorAll('.overlay.open').forEach(el=> el.classList.remove('open'));
});

loadEntries();

/* ---------------- cursor heart trail ---------------- */
if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  const HEART_COLORS = ['#A6332B', '#C9A227'];
  const SPAWN_INTERVAL_MS = 90; // lower = more frequent hearts
  const HEART_SVG = '<svg viewBox="0 0 32 29" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M23.6 0c-3.4 0-6.3 2-7.6 4.9C14.7 2 11.8 0 8.4 0 3.8 0 0 3.8 0 8.4c0 9.3 15.3 17.6 15.9 17.9.2.1.4.2.6.2s.4-.1.6-.2c.6-.3 15.9-8.6 15.9-17.9C33 3.8 29.2 0 24.6 0z" fill="currentColor"/></svg>';
  let lastHeartSpawn = 0;

  document.addEventListener('mousemove', (ev)=>{
    const now = Date.now();
    if(now - lastHeartSpawn < SPAWN_INTERVAL_MS) return;
    lastHeartSpawn = now;

    const heart = document.createElement('span');
    heart.className = 'cursor-heart';
    heart.innerHTML = HEART_SVG;
    heart.style.left = (ev.clientX + (Math.random()*10 - 5)) + 'px';
    heart.style.top = (ev.clientY + (Math.random()*10 - 5)) + 'px';
    heart.style.color = HEART_COLORS[Math.floor(Math.random() * HEART_COLORS.length)];
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), 900);
  });
}
</script>
